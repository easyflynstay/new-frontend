<svg xmlns="http://www.w3.org/2000/svg" width="380" height="240" viewBox="0 0 380 240" role="img" aria-labelledby="gcsTitle gcsDesc">
  <title id="gcsTitle">EasyFlyNStay Signature gift card</title>
  <desc id="gcsDesc">Gold gradient travel gift card with masked number, expiry beside the number, and cardholder name bottom left.</desc>

  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0a820"/>
      <stop offset="50%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#c28e0a"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="380" height="240" rx="14" fill="url(#cardBg)" filter="url(#softShadow)"/>
  <rect x="0.5" y="0.5" width="379" height="239" rx="13.5" fill="none" stroke="rgba(255,255,255,0.18)"/>

  <circle cx="320" cy="40" r="120" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="60" cy="200" r="90" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Top: brand + tier + plane (tile #EEC43C + #4a320f) -->
  <g fill="#451a03" fill-opacity="0.9">
    <text x="24" y="40" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="0.16em">EASYFLYNSTAY</text>
    <text x="24" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Signature</text>
  </g>

  <g transform="translate(320, 24)">
    <rect x="0" y="0" width="36" height="36" rx="0" fill="#EEC43C" stroke="rgba(120,53,15,0.12)" stroke-width="1"/>
    <g transform="translate(10, 10) scale(0.66667)" fill="#4a320f">
      <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
    </g>
  </g>

  <!-- Card number + expiry: identical ink weight -->
  <text x="24" y="128" font-family="ui-monospace, 'Cascadia Mono', 'Consolas', monospace" font-size="16.5" font-weight="600" fill="#4a320f" letter-spacing="0.2em" dominant-baseline="alphabetic">XXXX  XXXX  XXXX  5678</text>
  <text x="356" y="128" text-anchor="end" font-family="ui-monospace, 'Cascadia Mono', 'Consolas', monospace" font-size="16.5" font-weight="600" fill="#4a320f" letter-spacing="0.1em" dominant-baseline="alphabetic">03/29</text>

  <!-- Bottom: name (larger) vertically centered to E tile center (y=204) -->
  <text x="24" y="207" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#451a03" fill-opacity="0.95" dominant-baseline="middle" text-rendering="geometricPrecision">Priya Mehta</text>

  <g transform="translate(320, 186)">
    <rect x="0" y="0" width="36" height="36" rx="0" fill="#EEC43C" stroke="rgba(120,53,15,0.12)" stroke-width="1"/>
    <g transform="translate(18, 18)">
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#4a320f" transform="translate(-1.1, 0.25)" text-rendering="geometricPrecision">E</text>
    </g>
  </g>
</svg>
